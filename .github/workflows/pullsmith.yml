name: Pullsmith
on:
  workflow_dispatch:
    inputs:
        error:
            description: "Sentry error title"
            required: false
            default: "Sentry error"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "pullsmith[bot]@users.noreply.github.com"
          git config user.name "Pullsmith"
          ERROR="${{ github.event.inputs.error }}"
          BRANCH="pullsmith/fix:$(echo $ERROR | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-50)"
          PROMPT=$(cat .pullsmith | grep -A999 'prompt:' | tail -n +2 | sed 's/^[[:space:]]*//')
          npx @anthropic-ai/claude-code --dangerously-skip-permissions "$PROMPT. You are fixing this Sentry error: $ERROR. Create a new branch named $BRANCH, commit your changes, and open a pull request with the error title as the PR name."
