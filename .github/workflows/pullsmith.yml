name: Pullsmith
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt for Claude Code"
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Claude Code
        env:
          CLAUDE_API: ${{ secrets.CLAUDE_API }}
        run: |
          npx claude-code "${{ github.event.inputs.prompt }}"
